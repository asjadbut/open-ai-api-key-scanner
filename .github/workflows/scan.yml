name: OpenAI Key Scanner Elite

on:
  schedule:
    - cron: "0 6 * * *"   # Runs daily at 6AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Show files for debugging
        run: ls -R

      - name: Run scanner (daily)
        run: python scanner.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK }}
          DUMMY_MODE: "false"   # set "true" to test alert without real keys
