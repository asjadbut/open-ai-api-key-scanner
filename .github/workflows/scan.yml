name: OpenAI Key Scanner Elite

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run scanner
        run: python scanner.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK }}

      - name: Commit DB updates
        run: |
          git config --global user.name "scanner-bot"
          git config --global user.email "scanner@bot.com"

          git add findings_db.txt || true
          git commit -m "Update findings DB" || echo "No changes"
          git push
